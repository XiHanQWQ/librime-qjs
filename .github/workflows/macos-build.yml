name: macOS build
on:
  workflow_call:
    inputs:
      repository:
        default: HuangJian/librime
        required: false
        type: string
      rime_plugins:
        default: ${{ github.repository }}@${{ github.ref_name }}
        required: false
        type: string
      build_type:
        default: Nightly
        required: false
        type: string
      enable_coverage:
        default: false
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    strategy:
      fail-fast: false
    env:
      boost_version: 1.89.0
      BOOST_ROOT: ${{ github.workspace }}/deps/boost-1.89.0
      RIME_PLUGINS: ${{ inputs.rime_plugins }}
    steps:
#      - name: Configure tmate scrolling
#        # in copy mode (press Ctrl-b [ then use arrow keys or Page Up/Page Down)
#        run: |
#          mkdir -p ~/.tmate
#          echo "set -g history-limit 50000" > ~/.tmate.conf
#          echo "set -g terminal-overrides 'xterm*:smcup@:rmcup@'" >> ~/.tmate.conf
#      - name: Setup tmate session
#        uses: mxschmitt/action-tmate@v3
#        with:
#          limit-access-to-actor: true
#          timeout-minutes: 360
#          detached: true
      - name: Checkout last commit
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repository }}
          submodules: recursive

      - name: Configure build environment
        run: |
          brew install llvm ninja
          echo "CMAKE_GENERATOR=Ninja"  >> $GITHUB_ENV
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          echo git_ref_name="$(git describe --always)" >> $GITHUB_ENV
          

      - name: Configure build variant
        run: |
          echo BUILD_UNIVERSAL=1 >> $GITHUB_ENV

      - name: Install Boost
        run: ./install-boost.sh

      - name: Check submodules
        run: git submodule > submodule-status

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            bin
            include
            lib
            share
          key: ${{ runner.os }}-${{ runner.arch }}-deps-${{ hashFiles('submodule-status') }}

      - name: Build dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: make deps

      - name: Install Rime plugins
        run: ./action-install-plugins-macos.sh

      - name: Get librime-qjs commit hash
        run: |
          cd ./plugins/qjs
          echo qjs_git_ref_name="$(git describe --always)" >> $GITHUB_ENV

      - name: Build and test
        run: make test

      - name: Create distributable
        run: |
          make install
          mkdir assets
          cp -r ./version-info.txt ./assets
          cp -r ./dist/lib/** ./assets
          cp -r ./plugins/qjs/build/qjs ./assets
          cd ./plugins/qjs
          bash ./tools/update-version.sh ${{ inputs.build_type }}
          cd ../..
          cp -r ./plugins/qjs/contrib/rime.d.ts ./assets
          tar -cjvf librime-qjs-${{ env.qjs_git_ref_name }}-${{ runner.os }}-${{ runner.arch }}.tar.bz2  -C ./assets .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ runner.os }}-${{ runner.arch }}
          path: |
            librime-qjs-${{ env.qjs_git_ref_name }}-${{ runner.os }}-${{ runner.arch }}.tar.bz2

  coverage:
    runs-on: macos-15
    if: inputs.enable_coverage
    env:
      boost_version: 1.89.0
      BOOST_ROOT: ${{ github.workspace }}/deps/boost-1.89.0
      RIME_PLUGINS: ${{ inputs.rime_plugins }}
    steps:
      - name: Checkout last commit
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.repository }}
          submodules: recursive

      - name: Configure build environment
        run: |
          brew install llvm ninja
          echo "CMAKE_GENERATOR=Ninja"  >> $GITHUB_ENV
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          echo git_ref_name="$(git describe --always)" >> $GITHUB_ENV

      - name: Configure build variant
        run: |
          echo BUILD_UNIVERSAL=1 >> $GITHUB_ENV

      - name: Install Boost
        run: ./install-boost.sh

      - name: Check submodules
        run: git submodule > submodule-status

      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            bin
            include
            lib
            share
          key: ${{ runner.os }}-${{ runner.arch }}-deps-${{ hashFiles('submodule-status') }}

      - name: Build dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: make deps

      - name: Install Rime plugins
        run: ./action-install-plugins-macos.sh

      - name: Build and test with coverage
        run: |
          export CFLAGS="-fprofile-instr-generate -fcoverage-mapping"
          export CXXFLAGS="-fprofile-instr-generate -fcoverage-mapping"
          export LDFLAGS="-fprofile-instr-generate -fcoverage-mapping"
          cmake . -Bbuild -DCMAKE_BUILD_TYPE=Release -DENABLE_COVERAGE=ON -DENABLE_EXTERNAL_PLUGINS=ON -DBUILD_MERGED_PLUGINS=OFF -DBoost_NO_BOOST_CMAKE=TRUE -DBOOST_ROOT="${{ env.BOOST_ROOT }}" -DCMAKE_INSTALL_PREFIX="./dist" -GNinja
          cmake --build build
          export LLVM_PROFILE_FILE="code-%p.profraw"
          (cd build; ctest --output-on-failure)

      - name: Generate coverage report
        run: |
          find . -name "*.profraw"
          TEST_BINARY=$(find . -name "librime-qjs-tests" -type f | head -n 1)
          PLUGIN_LIB=$(find . -name "librime-qjs.dylib" -type f | head -n 1)
          PROFRAW_FILES=$(find . -name "*.profraw")
          echo "Test binary found at: $TEST_BINARY"
          echo "Plugin library found at: $PLUGIN_LIB"
          if [ -n "$PROFRAW_FILES" ]; then
            llvm-profdata merge -sparse $PROFRAW_FILES -o build/test.profdata
            COV_OBJECTS=""
            if [ -n "$PLUGIN_LIB" ]; then
              COV_OBJECTS="-object $PLUGIN_LIB"
            fi
            llvm-cov show "$TEST_BINARY" $COV_OBJECTS -instr-profile=build/test.profdata -format=html -output-dir=coverage_report ./plugins/qjs/src
            llvm-cov report "$TEST_BINARY" $COV_OBJECTS -instr-profile=build/test.profdata ./plugins/qjs/src
          else
            echo "No .profraw files found."
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-macOS
          path: coverage_report
